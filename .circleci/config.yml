version: 2.1

jobs:
  test-and-build:
    docker:
      - image: cimg/node:18.0
    steps:
      - checkout
      - run:
          name: Install frontend dependencies
          command: npm ci
      - run:
          name: Run frontend tests
          command: npm test
      - run:
          name: Build frontend
          command: npm run build
      - run:
          name: Install server dependencies
          command: cd server && npm ci
      - run:
          name: Run server tests
          command: cd server && npm test

  deploy-dev:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Install kubectl
          command: |
            curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl && sudo mv kubectl /usr/local/bin/
      - run:
          name: Configure Kubernetes
          command: |
            kubectl config set-cluster self-managed --server=$KUBE_SERVER --insecure-skip-tls-verify=true
            kubectl config set-credentials arc-runner-sa --token=$KUBE_TOKEN
            kubectl config set-context arc-context --cluster=self-managed --user=arc-runner-sa
            kubectl config use-context arc-context
            kubectl cluster-info
      - run:
          name: Build and push Docker image
          command: |
            BRANCH=$(echo "$CIRCLE_BRANCH" | sed 's/\//-/g')
            TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
            IMAGE_TAG="${BRANCH}-${TIMESTAMP}"
            echo $DOCKERHUB_PASSWORD | docker login -u $DOCKERHUB_USERNAME --password-stdin
            docker build -t previsetech/previselab-web-app:$IMAGE_TAG .
            docker push previsetech/previselab-web-app:$IMAGE_TAG
            echo "export IMAGE_TAG=$IMAGE_TAG" >> $BASH_ENV
      - run:
          name: Deploy to Kubernetes (develop namespace)
          command: |
            sed -i 's/namespace: landmark/namespace: develop/g' k8s/*.yml
            sed -i "s|image: landmark-technologies:latest|image: previsetech/previselab-web-app:$IMAGE_TAG|g" k8s/app-deployment.yml
            kubectl apply -f k8s/namespace.yml
            kubectl apply -f k8s/

  deploy-stg:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Install kubectl
          command: |
            curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl && sudo mv kubectl /usr/local/bin/
      - run:
          name: Configure Kubernetes
          command: |
            kubectl config set-cluster self-managed --server=$KUBE_SERVER --insecure-skip-tls-verify=true
            kubectl config set-credentials arc-runner-sa --token=$KUBE_TOKEN
            kubectl config set-context arc-context --cluster=self-managed --user=arc-runner-sa
            kubectl config use-context arc-context
            kubectl cluster-info
      - run:
          name: Build and push Docker image
          command: |
            BRANCH=$(echo "$CIRCLE_BRANCH" | sed 's/\//-/g')
            TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
            IMAGE_TAG="${BRANCH}-${TIMESTAMP}"
            echo $DOCKERHUB_PASSWORD | docker login -u $DOCKERHUB_USERNAME --password-stdin
            docker build -t previsetech/previselab-web-app:$IMAGE_TAG .
            docker push previsetech/previselab-web-app:$IMAGE_TAG
            echo "export IMAGE_TAG=$IMAGE_TAG" >> $BASH_ENV
      - run:
          name: Deploy to Kubernetes (staging namespace)
          command: |
            sed -i 's/namespace: landmark/namespace: staging/g' k8s/*.yml
            sed -i "s|image: landmark-technologies:latest|image: previsetech/previselab-web-app:$IMAGE_TAG|g" k8s/app-deployment.yml
            kubectl apply -f k8s/namespace.yml
            kubectl apply -f k8s/

  deploy-prod:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Install kubectl
          command: |
            curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl && sudo mv kubectl /usr/local/bin/
      - run:
          name: Configure Kubernetes
          command: |
            kubectl config set-cluster self-managed --server=$KUBE_SERVER --insecure-skip-tls-verify=true
            kubectl config set-credentials arc-runner-sa --token=$KUBE_TOKEN
            kubectl config set-context arc-context --cluster=self-managed --user=arc-runner-sa
            kubectl config use-context arc-context
            kubectl cluster-info
      - run:
          name: Build and push Docker image
          command: |
            BRANCH=$(echo "$CIRCLE_BRANCH" | sed 's/\//-/g')
            TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
            IMAGE_TAG="${BRANCH}-${TIMESTAMP}"
            echo $DOCKERHUB_PASSWORD | docker login -u $DOCKERHUB_USERNAME --password-stdin
            docker build -t previsetech/previselab-web-app:$IMAGE_TAG .
            docker push previsetech/previselab-web-app:$IMAGE_TAG
            echo "export IMAGE_TAG=$IMAGE_TAG" >> $BASH_ENV
      - run:
          name: Deploy to Kubernetes (production namespace)
          command: |
            sed -i 's/namespace: landmark/namespace: production/g' k8s/*.yml
            sed -i "s|image: landmark-technologies:latest|image: previsetech/previselab-web-app:$IMAGE_TAG|g" k8s/app-deployment.yml
            kubectl apply -f k8s/namespace.yml
            kubectl apply -f k8s/

workflows:
  pipeline:
    jobs:
      - test-and-build
      - deploy-dev:
          context: develop
          requires:
            - test-and-build
          filters:
            branches:
              only: develop
      - deploy-stg:
          context: staging
          requires:
            - test-and-build
          filters:
            branches:
              only: /^release.*/
      - deploy-prod:
          context: production
          requires:
            - test-and-build
          filters:
            branches:
              only:
                - main
                - /^hotfix.*/
