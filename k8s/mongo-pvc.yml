apiVersion: v1
kind: PersistentVolume
metadata:
  name: mongo-pvc
  namespace: landmark
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  hostPath:
    path: /mnt/data/pv001
    type: DirectoryOrCreate
